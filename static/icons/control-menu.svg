<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4"
        flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Top toggle (OFF / outline) -->
  <g filter="url(#soft)">
    <rect x="40" y="60" width="240" height="90" rx="45"
      fill="none" stroke="#000" stroke-width="22"/>
    <circle cx="90" cy="105" r="30"
      fill="none" stroke="#000" stroke-width="22"/>
  </g>

  <!-- Bottom toggle (ON / filled + SAME circle style) -->
  <g filter="url(#soft)">
    <rect x="40" y="170" width="240" height="90" rx="45"
      fill="#000"/>
    <circle cx="230" cy="215" r="30"
      fill="none" stroke="#000" stroke-width="22"/>
  </g>
</svg>
